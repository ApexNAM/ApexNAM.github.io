<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description }}">

    <!-- Open Graph -->
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="{{ page.excerpt | default: site.description }}">
    <meta property="og:image" content="{{ site.url }}{{ page.og_image | default: site.default_og_image }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">

    <!-- Twitter (X) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="{{ site.url }}{{ page.url }}">
    <meta name="twitter:title" content="{{ page.title }}">
    <meta name="twitter:description" content="{{ page.excerpt | default: site.description }}">
    <meta name="twitter:image" content="{{ site.url }}{{ page.og_image | default: site.default_og_image }}">

    <link href="{{ '/assets/css/post.css' | relative_url }}" rel="stylesheet">
    <link rel="icon" href="/skagogames.ico" type="image/x-icon">

    <!-- MathJax — $...$ 인라인, $$...$$ 블럭 수식 지원 -->
    <script>
      MathJax = {
        tex: {
          inlineMath:  [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true,
          processEnvironments: true
        },
        options: {
          skipHtmlTags: ['script','noscript','style','textarea','pre','code']
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  </head>

  <body>

    <header class="post-header">
      <a href="{{ site.baseurl }}/">
        <img src="{{ site.baseurl }}/srcs/logos/SkagoGames_NewLogo_2026_W.png" alt="SkagoGames 로고" class="logo">
      </a>
      <h1 class="post-header__title">{{ page.title }}</h1>
      {% if page.date %}
        <p class="post-header__date">{{ page.date | date: "%Y-%m-%d" }}</p>
      {% endif %}
    </header>

    <main>
      <div class="markdown-body">
        {{ content }}
      </div>
    </main>

    <footer class="post-footer">
      <p class="footer-text">SkagoGames. made in Skago.</p>
    </footer>

    <script>
    (function () {

      /* ── Obsidian 호환: 이미지 경로·위키링크·URL 자동 보정 ── */
      (function () {
        var root = document.querySelector('.markdown-body');
        if (!root) return;

        var IMG_DIR = '/srcs/imgs/post_imgs/';

        /* 1) 상대 경로 이미지 → 사이트 루트 기준 절대 경로 */
        root.querySelectorAll('img').forEach(function (img) {
          var src = img.getAttribute('src') || '';
          if (src && src.charAt(0) !== '/' &&
              !/^(?:[a-z][a-z0-9+.-]*:|\/\/)/i.test(src)) {
            img.setAttribute('src', '/' + src);
          }
        });

        /* 2) 텍스트로 남은 ![[파일.png]] 임베드와 맨 URL 처리 */
        var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
          acceptNode: function (n) {
            var p = n.parentNode;
            while (p && p !== root) {
              var t = p.nodeName;
              if (t === 'A' || t === 'CODE' || t === 'PRE' ||
                  t === 'SCRIPT' || t === 'STYLE') return NodeFilter.FILTER_REJECT;
              p = p.parentNode;
            }
            return NodeFilter.FILTER_ACCEPT;
          }
        });
        var textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);

        var pattern = /!\[\[([^\]|]+?)(?:\|([^\]]*))?\]\]|https?:\/\/[A-Za-z0-9\-._~:/?#@!$&'()*+,;=%]+/g;

        textNodes.forEach(function (node) {
          var text = node.nodeValue;
          if (!/!\[\[|https?:\/\//.test(text)) return;

          var frag = document.createDocumentFragment();
          var last = 0, m;
          pattern.lastIndex = 0;

          while ((m = pattern.exec(text))) {
            frag.appendChild(document.createTextNode(text.slice(last, m.index)));
            last = pattern.lastIndex;

            if (m[0].charAt(0) === '!') {
              /* ![[파일.png]] 또는 ![[파일.png|400]] → <img> */
              var target = m[1].trim();
              var opt    = (m[2] || '').trim();
              var src    = target.indexOf('/') !== -1 ? target : IMG_DIR + target;
              if (src.charAt(0) !== '/') src = '/' + src;

              var img = document.createElement('img');
              img.src = encodeURI(src);
              img.alt = /^\d+$/.test(opt) || !opt ? target : opt;
              img.style.maxWidth = /^\d+$/.test(opt) ? opt + 'px' : '600px';
              img.style.height = 'auto';
              frag.appendChild(img);
            } else {
              /* 맨 URL → 클릭 가능한 링크 (끝에 붙은 문장부호는 제외) */
              var url = m[0], trail = '';
              while (/[.,;:!?'"”’]$/.test(url) ||
                     (url.slice(-1) === ')' && url.indexOf('(') === -1)) {
                trail = url.slice(-1) + trail;
                url = url.slice(0, -1);
              }
              var a = document.createElement('a');
              a.href = url;
              a.textContent = url;
              a.target = '_blank';
              a.rel = 'noopener';
              frag.appendChild(a);
              if (trail) frag.appendChild(document.createTextNode(trail));
            }
          }

          frag.appendChild(document.createTextNode(text.slice(last)));
          node.parentNode.replaceChild(frag, node);
        });
      }());

      /* ── 콜아웃 변환 (Obsidian > [!TYPE] → styled callout) ── */
      var typeMap = {
        note:      { icon: 'ℹ️',  label: 'NOTE',      color: 'note'      },
        info:      { icon: 'ℹ️',  label: 'INFO',      color: 'note'      },
        abstract:  { icon: '📋', label: 'ABSTRACT',  color: 'note'      },
        summary:   { icon: '📋', label: 'SUMMARY',   color: 'note'      },
        tldr:      { icon: '📋', label: 'TL;DR',     color: 'note'      },
        tip:       { icon: '💡', label: 'TIP',       color: 'tip'       },
        hint:      { icon: '💡', label: 'HINT',      color: 'tip'       },
        important: { icon: '🔷', label: 'IMPORTANT', color: 'important' },
        warning:   { icon: '⚠️', label: 'WARNING',   color: 'warning'   },
        caution:   { icon: '⚠️', label: 'CAUTION',   color: 'warning'   },
        attention: { icon: '⚠️', label: 'ATTENTION', color: 'warning'   },
        danger:    { icon: '🔴', label: 'DANGER',    color: 'danger'    },
        error:     { icon: '🔴', label: 'ERROR',     color: 'danger'    },
        bug:       { icon: '🐛', label: 'BUG',       color: 'danger'    },
        failure:   { icon: '❌', label: 'FAILURE',   color: 'danger'    },
        fail:      { icon: '❌', label: 'FAIL',      color: 'danger'    },
        missing:   { icon: '❌', label: 'MISSING',   color: 'danger'    },
        success:   { icon: '✅', label: 'SUCCESS',   color: 'success'   },
        check:     { icon: '✅', label: 'CHECK',     color: 'success'   },
        done:      { icon: '✅', label: 'DONE',      color: 'success'   },
        question:  { icon: '❓', label: 'QUESTION',  color: 'question'  },
        help:      { icon: '❓', label: 'HELP',      color: 'question'  },
        faq:       { icon: '❓', label: 'FAQ',       color: 'question'  },
        example:   { icon: '🔍', label: 'EXAMPLE',   color: 'example'   },
        quote:     { icon: '💬', label: 'QUOTE',     color: 'quote'     },
        cite:      { icon: '💬', label: 'CITE',      color: 'quote'     }
      };

      document.querySelectorAll('.markdown-body blockquote').forEach(function (bq) {
        var firstP = bq.querySelector('p:first-child');
        if (!firstP) return;

        /* [!TYPE], [!TYPE+], [!TYPE-], [!TYPE Custom Title] 패턴 매칭 */
        var m = firstP.textContent.trim().match(/^\[!([\w]+)([+\-]?)(?:\s+([\s\S]*))?$/);
        if (!m) return;

        var type   = m[1].toLowerCase();
        var mode   = m[2];               /* '+' 펼침 | '-' 접힘 | '' 고정 */
        var cTitle = (m[3] || '').trim();
        var info   = typeMap[type] || { icon: '📌', label: type.toUpperCase(), color: 'note' };
        var label  = cTitle || info.label;

        bq.classList.add('callout', 'callout-' + info.color);

        /* 본문 노드 수집 */
        var bodyFrag = document.createDocumentFragment();
        Array.from(bq.children).slice(1).forEach(function (c) { bodyFrag.appendChild(c); });
        var bodyDiv = document.createElement('div');
        bodyDiv.className = 'callout-body';
        bodyDiv.appendChild(bodyFrag);

        firstP.remove();
        bq.innerHTML = '';

        var titleHTML = '<span class="callout-icon">' + info.icon + '</span>'
                      + '<span class="callout-label">' + label + '</span>';

        if (mode === '+' || mode === '-') {
          /* 접기/펼치기 */
          var details = document.createElement('details');
          if (mode !== '-') details.open = true;

          var summary = document.createElement('summary');
          var titleDiv = document.createElement('div');
          titleDiv.className = 'callout-title';
          titleDiv.innerHTML = titleHTML + '<span class="callout-fold">&#9654;</span>';
          summary.appendChild(titleDiv);

          details.appendChild(summary);
          details.appendChild(bodyDiv);
          bq.appendChild(details);
        } else {
          /* 고정 */
          var titleDiv2 = document.createElement('div');
          titleDiv2.className = 'callout-title';
          titleDiv2.innerHTML = titleHTML;
          bq.appendChild(titleDiv2);
          bq.appendChild(bodyDiv);
        }
      });

      /* ── 각주 툴팁 ── */
      (function () {
        var tip = null;
        var hideTimer = null;

        function buildTip(anchor) {
          var id = (anchor.getAttribute('href') || '').replace('#', '');
          var fnEl = document.getElementById(id);
          if (!fnEl) return null;

          var clone = fnEl.cloneNode(true);
          var back = clone.querySelector('.reversefootnote');
          if (back) back.remove();

          var el = document.createElement('div');
          el.className = 'fn-tooltip';
          el.innerHTML = clone.innerHTML.trim();
          document.body.appendChild(el);
          return el;
        }

        function placeTip(el, anchor) {
          var ar = anchor.getBoundingClientRect();
          var tr = el.getBoundingClientRect();
          var gap = 7;
          var top = ar.top - tr.height - gap;
          if (top < 8) top = ar.bottom + gap;
          var left = ar.left + ar.width / 2 - tr.width / 2;
          left = Math.max(8, Math.min(left, window.innerWidth - tr.width - 8));
          el.style.top  = top  + 'px';
          el.style.left = left + 'px';
        }

        document.querySelectorAll('.markdown-body a.footnote').forEach(function (a) {
          a.addEventListener('mouseenter', function () {
            clearTimeout(hideTimer);
            if (tip) { tip.remove(); tip = null; }
            tip = buildTip(a);
            if (!tip) return;
            placeTip(tip, a);
            requestAnimationFrame(function () { tip && tip.classList.add('fn-tooltip--visible'); });
          });
          a.addEventListener('mouseleave', function () {
            hideTimer = setTimeout(function () {
              if (tip) {
                tip.classList.remove('fn-tooltip--visible');
                setTimeout(function () { if (tip) { tip.remove(); tip = null; } }, 150);
              }
            }, 80);
          });
        });
      }());

      /* ── 코드 블럭 언어 레이블 ── */
      document.querySelectorAll('.markdown-body [class*="language-"]').forEach(function (wrapper) {
        var highlight = wrapper.querySelector('.highlight');
        if (!highlight) return;

        var langClass = Array.from(wrapper.classList).find(function (c) {
          return c.startsWith('language-') && !c.includes('highlighter');
        });
        if (!langClass) return;

        var lang = langClass.replace('language-', '').trim();
        if (!lang) return;

        var lbl = document.createElement('span');
        lbl.className = 'code-lang';
        lbl.textContent = lang;
        highlight.appendChild(lbl);
      });

    })();
    </script>

  </body>
</html>
