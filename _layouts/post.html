<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description }}">

    <!-- Open Graph -->
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="{{ page.excerpt | default: site.description }}">
    <meta property="og:image" content="{{ site.url }}{{ page.og_image | default: site.default_og_image }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">

    <!-- Twitter (X) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="{{ site.url }}{{ page.url }}">
    <meta name="twitter:title" content="{{ page.title }}">
    <meta name="twitter:description" content="{{ page.excerpt | default: site.description }}">
    <meta name="twitter:image" content="{{ site.url }}{{ page.og_image | default: site.default_og_image }}">

    <link href="{{ '/assets/css/markdown.css' | relative_url }}" rel="stylesheet">
    <link rel="icon" href="/skagogames.ico" type="image/x-icon">
  </head>

  <body>

    <!-- 헤더 -->
    <header class="post-header">
      <a href="{{ site.baseurl }}/">
        <img src="{{ site.baseurl }}/srcs/logos/SG_Logo_Title_White.png" alt="Logo" class="logo">
      </a>
      <h1 class="post-header__title">{{ page.title }}</h1>
      {% if page.date %}
        <p class="post-header__date">{{ page.date | date: "%Y-%m-%d" }}</p>
      {% endif %}
    </header>

    <!-- 본문 -->
    <main>
      <div class="markdown-body">
        {{ content }}
      </div>
    </main>

    <!-- 푸터 -->
    <footer class="post-footer">
      <p class="footer-text">SkagoGames. made in Skago.</p>
    </footer>

  </body>
</html>
