<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torizon : Telecom</title>
    <style>
        /* 1. 브라우저 기본 여백 제거 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            /* 스크롤바가 생기는 것을 방지 */
            overflow: hidden; 
        }

        /* 2. 배경 이미지 설정 영역 */
        .bg-container {
            /* 이미지 경로를 넣어주세요 (1920x1080 권장) */
            background-image: url('./srcs/TT27_Back.png');
            
            /* 배경 이미지 핵심 속성 */
            background-size: cover;      /* 비율 유지하며 꽉 채움 */
            background-position: center;  /* 이미지 중앙 정렬 */
            background-repeat: no-repeat; /* 반복 방지 */
            
            /* 화면 전체 높이/너비 지정 */
            width: 100vw;
            height: 100vh;

            /* 이미지 위에 글자를 띄우기 위한 설정 (선택사항) */
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="bg-container">
    </div>

</body>
</html>
